---
# harleydev deployment overlay for Pigify.
#
# Add it to the stack's compose `include:` list. It defines two services:
#
#   pigify-api  - the FastAPI backend, internal only. Given the network
#                 alias `backend` so the frontend nginx (which proxies
#                 /api to http://backend:8000) works unchanged.
#   pigify      - the frontend (nginx SPA), exposed via Traefik. Traefik
#                 terminates public TLS, so the container serves plain HTTP
#                 on 8080 using the mounted nginx-proxied.conf (the default
#                 image config does its own HTTPS for the local stack).
#
# Auth: TWO layers, and they are complementary, not redundant:
#   1. Authelia SSO (forward-auth chain on the Traefik router below) gates
#      ACCESS TO THE APP — pigify is not meant to be public.
#   2. Spotify OAuth (the app's own login) authorizes the Spotify API for
#      the signed-in user.
# The Spotify callback (/api/auth/spotify/callback) is reached by the
# already-Authelia-authenticated browser (it carries the Authelia session
# cookie from step 1), so it passes the chain — no path whitelist needed.
#
# Spotify dashboard: set the redirect URI to
#   https://$PIGIFY_DOMAIN/api/auth/spotify/callback
#
# Images are published to ghcr.io. Authenticate on the VPS to pull:
#   docker login ghcr.io -u harleypig --password-stdin   # read:packages PAT
# Domain, paths, secrets, and TZ come from the stack's .env / secret files.

services:
  pigify-api:
    container_name: pigify-api
    image: ghcr.io/harleypig/pigify-backend:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    networks:
      internal_services:
        aliases:
          - backend

    volumes:
      - $DATA_DIR/pigify/data:/data

    environment:
      - TZ=$TZ
      - ENVIRONMENT=production
      - DATA_DIR=/data
      - SPOTIFY_CLIENT_ID=$PIGIFY_SPOTIFY_CLIENT_ID
      - SPOTIFY_REDIRECT_URI=https://$PIGIFY_DOMAIN/api/auth/spotify/callback
      - FRONTEND_URL=https://$PIGIFY_DOMAIN
      - BACKEND_URL=https://$PIGIFY_DOMAIN
      # Secrets via files (Docker secrets / mounted). Provide these on the
      # host; the backend reads them through the *_FILE convention.
      - SPOTIFY_CLIENT_SECRET_FILE=/run/secrets/pigify_spotify_client_secret
      - SECRET_KEY_FILE=/run/secrets/pigify_secret_key
      # Optional Last.fm:
      - LASTFM_API_KEY=$PIGIFY_LASTFM_API_KEY
      - LASTFM_SHARED_SECRET=$PIGIFY_LASTFM_SHARED_SECRET

    secrets:
      - pigify_spotify_client_secret
      - pigify_secret_key

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  pigify:
    container_name: pigify
    image: ghcr.io/harleypig/pigify-frontend:latest
    restart: unless-stopped

    depends_on:
      traefik:
        condition: service_healthy
      pigify-api:
        condition: service_healthy

    networks:
      - external_proxy
      - internal_services

    environment:
      - TZ=$TZ

    volumes:
      # Serve plain HTTP behind Traefik (Traefik owns TLS).
      - ./pigify/nginx-proxied.conf:/etc/nginx/conf.d/default.conf:ro

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    labels:
      - "traefik.enable=true"
      - "traefik.http.services.pigify-svc.loadbalancer.server.port=8080"
      - "traefik.http.routers.pigify-rtr.entrypoints=websecure"
      - "traefik.http.routers.pigify-rtr.rule=Host(`$PIGIFY_DOMAIN`)"
      # SSO in front of the whole app (access gate). Spotify OAuth still
      # runs inside the app for API authorization.
      - "traefik.http.routers.pigify-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.pigify-rtr.service=pigify-svc"
      - "traefik.http.routers.pigify-rtr.tls=true"
      - "traefik.http.routers.pigify-rtr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pigify-rtr.tls.options=tls-opts@file"

secrets:
  pigify_spotify_client_secret:
    file: $DATA_DIR/pigify/secrets/spotify_client_secret.txt
  pigify_secret_key:
    file: $DATA_DIR/pigify/secrets/secret_key.txt
