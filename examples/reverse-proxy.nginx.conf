# Plain-HTTP nginx variant for running behind a TLS-terminating reverse
# proxy (Traefik, Caddy, nginx, an ingress controller, ...). The default
# image config (frontend/nginx.conf) serves HTTPS itself for the local
# standalone stack; when a proxy owns public TLS, mount THIS file over
# /etc/nginx/conf.d/default.conf so the container just serves HTTP on 8080.
# See docs/DEPLOYMENT.md.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Spotify Web Playback SDK CSP (kept in sync with frontend/nginx.conf).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://sdk.scdn.co; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.scdn.co https://*.spotifycdn.com; font-src 'self' data:; connect-src 'self' https://api.spotify.com https://*.spotify.com wss://*.spotify.com https://*.scdn.co; media-src 'self' https://*.scdn.co; frame-src https://sdk.scdn.co https://*.spotify.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
