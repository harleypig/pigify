# Alembic config for the SYSTEM database environment.
# Use:
#   uv run alembic -c backend/migrations/system/alembic.ini revision -m "msg"
#   uv run alembic -c backend/migrations/system/alembic.ini upgrade head
[alembic]
script_location = backend/migrations/system
prepend_sys_path = .
version_path_separator = os
# URL is derived from settings.SYSTEM_DATABASE_URL / DATA_DIR by env.py.
# This default is only used if env.py can't compute one.
sqlalchemy.url = sqlite:///placeholder.db

[loggers]
keys = root,alembic
[handlers]
keys = console
[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
