# Alembic config for the PER-USER database environment.
# Use:
#   uv run alembic -c backend/migrations/user/alembic.ini revision -m "msg"
# To upgrade a single user DB manually, prefer the CLI:
#   uv run python -m backend.app.db.cli upgrade-user <spotify_id>
[alembic]
script_location = backend/migrations/user
prepend_sys_path = .
version_path_separator = os
# Per-user URL is supplied at runtime by bootstrap.py via Config.attributes
# or by the CLI. This default is only used for offline `revision` commands.
sqlalchemy.url = sqlite:///placeholder.db

[loggers]
keys = root,alembic
[handlers]
keys = console
[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
