# Frontend nginx: serves the built SPA over HTTPS and proxies /api to the
# backend. TLS terminates here (Spotify OAuth requires HTTPS); the backend
# stays plain HTTP on the internal compose network.
server {
    listen 8080 ssl;
    http2 on;
    server_name _;

    # mkcert dev certs, mounted read-only at /certs by docker-compose.
    ssl_certificate     /certs/dev-cert.pem;
    ssl_certificate_key /certs/dev-key.pem;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Security headers. The CSP is sized for the Spotify Web Playback SDK
    # (loaded from sdk.scdn.co, talks to *.spotify.com over https/wss, album
    # art from *.scdn.co). style-src is 'self' with NO 'unsafe-inline': the
    # prod build emits external CSS via <link> (no inline <style> blocks), and
    # React applies its dynamic style={} via the CSSOM (which style-src does
    # not govern), so no inline styles need allowing.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    # autoplay + encrypted-media (EME) must be allowed so they can be
    # delegated to the Spotify Web Playback SDK's cross-origin iframe
    # (sdk.scdn.co); the default `self` allowlist blocks the delegation and
    # the SDK's connect() fails. CSP frame-src already restricts which origins
    # may be framed, so `*` here is effectively scoped to those.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), autoplay=*, encrypted-media=*" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://sdk.scdn.co; style-src 'self'; img-src 'self' data: https://*.scdn.co https://*.spotifycdn.com; font-src 'self' data:; connect-src 'self' https://api.spotify.com https://*.spotify.com wss://*.spotify.com https://*.scdn.co; media-src 'self' https://*.scdn.co; frame-src https://sdk.scdn.co https://*.spotify.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Proxy API calls to the backend service (full /api/* URI preserved).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
